name: tests

on:
  push:
  pull_request:

jobs:
  bats:
    name: bats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats suite
        run: |
          bats tests/inject_skip_tag.bats


